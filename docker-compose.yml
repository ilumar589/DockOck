services:
  # Primary instance – Gherkin generator (port 11434)
  ollama-generator:
    image: ollama/ollama:latest
    container_name: dockock-ollama-generator
    ports:
      - "11434:11434"
    volumes:
      - ollama_data_generator:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
    restart: unless-stopped
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        ollama serve &
        OLLAMA_PID=$$!
        echo "Waiting for Ollama (generator) to start..."
        sleep 5
        echo "Pulling llama3.2 model..."
        ollama pull llama3.2 || true
        wait $$OLLAMA_PID

  # Second instance – Document extractor / summariser (port 11435)
  ollama-extractor:
    image: ollama/ollama:latest
    container_name: dockock-ollama-extractor
    ports:
      - "11435:11434"
    volumes:
      - ollama_data_extractor:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
    restart: unless-stopped
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        ollama serve &
        OLLAMA_PID=$$!
        echo "Waiting for Ollama (extractor) to start..."
        sleep 5
        echo "Pulling llama3.2 model..."
        ollama pull llama3.2 || true
        wait $$OLLAMA_PID

  # Third instance – Gherkin reviewer / validator (port 11436)
  ollama-reviewer:
    image: ollama/ollama:latest
    container_name: dockock-ollama-reviewer
    ports:
      - "11436:11434"
    volumes:
      - ollama_data_reviewer:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
    restart: unless-stopped
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        ollama serve &
        OLLAMA_PID=$$!
        echo "Waiting for Ollama (reviewer) to start..."
        sleep 5
        echo "Pulling llama3.2 model..."
        ollama pull llama3.2 || true
        wait $$OLLAMA_PID

volumes:
  ollama_data_generator:
    driver: local
  ollama_data_extractor:
    driver: local
  ollama_data_reviewer:
    driver: local
