services:
  ollama:
    image: ollama/ollama:latest
    container_name: dockock-ollama
    ports:
      - "11434:11434"
    volumes:
      # Persist downloaded models between restarts
      - ollama_data:/root/.ollama
    environment:
      # Bind to all interfaces so the host can reach the API
      - OLLAMA_HOST=0.0.0.0
    restart: unless-stopped
    # Pull the default model on startup if it is not already present
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        ollama serve &
        OLLAMA_PID=$$!
        echo "Waiting for Ollama to start..."
        sleep 5
        echo "Pulling llama3.2 model (skip if already present)..."
        ollama pull llama3.2 || true
        wait $$OLLAMA_PID

volumes:
  ollama_data:
    driver: local
