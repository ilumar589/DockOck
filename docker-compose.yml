services:
  # Primary instance – Gherkin generator (port 11434)
  ollama-generator:
    image: ollama/ollama:latest
    container_name: dockock-ollama-generator
    ports:
      - "11434:11434"
    volumes:
      - ollama_data_generator:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
      - OLLAMA_NUM_PARALLEL=4
    restart: unless-stopped
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        ollama serve &
        OLLAMA_PID=$$!
        echo "Waiting for Ollama (generator) to start..."
        sleep 5
        echo "Pulling qwen2.5-coder:32b model..."
        ollama pull qwen2.5-coder:32b || true
        wait $$OLLAMA_PID

  # Second instance – Document extractor / summariser (port 11435)
  ollama-extractor:
    image: ollama/ollama:latest
    container_name: dockock-ollama-extractor
    ports:
      - "11435:11434"
    volumes:
      - ollama_data_extractor:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
      - OLLAMA_NUM_PARALLEL=4
    restart: unless-stopped
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        ollama serve &
        OLLAMA_PID=$$!
        echo "Waiting for Ollama (extractor) to start..."
        sleep 5
        echo "Pulling qwen2.5-coder:7b model..."
        ollama pull qwen2.5-coder:7b || true
        wait $$OLLAMA_PID

  # Fourth instance – Vision / image description (port 11437)
  ollama-vision:
    image: ollama/ollama:latest
    container_name: dockock-ollama-vision
    ports:
      - "11437:11434"
    volumes:
      - ollama_data_vision:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
      - OLLAMA_NUM_PARALLEL=2
    restart: unless-stopped
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        ollama serve &
        OLLAMA_PID=$$!
        echo "Waiting for Ollama (vision) to start..."
        sleep 5
        echo "Pulling moondream vision model (CPU-friendly)..."
        ollama pull moondream || true
        wait $$OLLAMA_PID

  # Third instance – Gherkin reviewer / validator (port 11436)
  ollama-reviewer:
    image: ollama/ollama:latest
    container_name: dockock-ollama-reviewer
    ports:
      - "11436:11434"
    volumes:
      - ollama_data_reviewer:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
      - OLLAMA_NUM_PARALLEL=4
    restart: unless-stopped
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        ollama serve &
        OLLAMA_PID=$$!
        echo "Waiting for Ollama (reviewer) to start..."
        sleep 5
        echo "Pulling qwen2.5-coder:7b model..."
        ollama pull qwen2.5-coder:7b || true
        wait $$OLLAMA_PID

  # OpenSpec artifact generator service (port 11438)
  openspec:
    build:
      context: ./openspec-service
      dockerfile: Dockerfile
    container_name: dockock-openspec
    ports:
      - "11438:3000"
    environment:
      - OLLAMA_URL=http://ollama-generator:11434
      - OLLAMA_MODEL=qwen2.5-coder:32b
    volumes:
      - openspec_workspace:/workspace
    restart: unless-stopped

volumes:
  ollama_data_generator:
    driver: local
  ollama_data_extractor:
    driver: local
  ollama_data_reviewer:
    driver: local
  ollama_data_vision:
    driver: local
  openspec_workspace:
    driver: local
