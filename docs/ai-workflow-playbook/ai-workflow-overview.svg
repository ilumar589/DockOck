<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 760" role="img" aria-labelledby="title desc">
  <title id="title">Itineris AI delivery workflow overview</title>
  <desc id="desc">A high-level workflow diagram showing document ingestion, Gherkin validation, implementation, and automated testing.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7f4ea"/>
      <stop offset="100%" stop-color="#edf4ff"/>
    </linearGradient>
    <linearGradient id="brandGlow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e40189"/>
      <stop offset="100%" stop-color="#c70076"/>
    </linearGradient>
    <linearGradient id="cardA" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f766e"/>
      <stop offset="100%" stop-color="#115e59"/>
    </linearGradient>
    <linearGradient id="cardB" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="cardC" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#1e40af"/>
    </linearGradient>
    <linearGradient id="cardD" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#5b21b6"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#0f172a" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#475569"/>
    </marker>
    <style>
      .title { font: 700 34px 'Montserrat', Arial, Helvetica, sans-serif; fill: #e40189; }
      .subtitle { font: 400 18px 'Montserrat', Arial, Helvetica, sans-serif; fill: #3f4b5b; }
      .cardTitle { font: 700 22px 'Montserrat', Arial, Helvetica, sans-serif; fill: #ffffff; }
      .cardBody { font: 400 15px 'Montserrat', Arial, Helvetica, sans-serif; fill: #ecfeff; }
      .label { font: 700 14px 'Montserrat', Arial, Helvetica, sans-serif; fill: #e40189; letter-spacing: 1px; }
      .chip { font: 600 13px 'Montserrat', Arial, Helvetica, sans-serif; fill: #1d1d1f; }
      .footer { font: 400 15px 'Montserrat', Arial, Helvetica, sans-serif; fill: #3f4b5b; }
      .flow { fill: none; stroke: #475569; stroke-width: 4; marker-end: url(#arrow); }
      .accent { fill: #ffffff; opacity: 0.18; }
    </style>
  </defs>

  <rect width="1600" height="760" rx="36" fill="url(#bg)"/>
  <circle cx="140" cy="120" r="90" fill="url(#brandGlow)" opacity="0.12"/>
  <circle cx="1460" cy="640" r="120" fill="#1d4ed8" opacity="0.10"/>
  <circle cx="1490" cy="94" r="58" fill="url(#brandGlow)" opacity="0.18"/>

  <text x="80" y="84" class="title">Itineris AI Delivery Workflow</text>
  <text x="80" y="116" class="subtitle">From source documents to corrected Gherkins, implementation slices, and independent automated tests</text>

  <text x="90" y="178" class="label">DOCUMENT INTAKE</text>
  <rect x="80" y="200" width="290" height="180" rx="28" fill="url(#cardA)" filter="url(#shadow)"/>
  <circle cx="330" cy="236" r="54" class="accent"/>
  <text x="108" y="258" class="cardTitle">1. DockOck Ingestion</text>
  <text x="108" y="292" class="cardBody">Word requirements</text>
  <text x="108" y="318" class="cardBody">Excel reference data</text>
  <text x="108" y="344" class="cardBody">Visio workflows and states</text>

  <text x="420" y="178" class="label">SPECIFICATION QUALITY LOOP</text>
  <rect x="410" y="200" width="340" height="180" rx="28" fill="url(#cardB)" filter="url(#shadow)"/>
  <circle cx="700" cy="236" r="58" class="accent"/>
  <text x="438" y="258" class="cardTitle">2. Gherkin Validation</text>
  <text x="438" y="292" class="cardBody">Generate draft Gherkins</text>
  <text x="438" y="318" class="cardBody">Compare with Itineris validation files</text>
  <text x="438" y="344" class="cardBody">Extract patterns and improve output</text>

  <text x="800" y="178" class="label">IMPLEMENTATION CONTROL</text>
  <rect x="790" y="200" width="330" height="180" rx="28" fill="url(#cardC)" filter="url(#shadow)"/>
  <circle cx="1070" cy="236" r="56" class="accent"/>
  <text x="818" y="258" class="cardTitle">3. OpenSpec + OpenCode</text>
  <text x="818" y="292" class="cardBody">Approved Gherkins become the hand-off</text>
  <text x="818" y="318" class="cardBody">artifact for planning and feature slices</text>
  <text x="818" y="344" class="cardBody">Agent-driven implementation stays bounded</text>

  <text x="1170" y="178" class="label">AUTOMATED VERIFICATION</text>
  <rect x="1160" y="200" width="360" height="180" rx="28" fill="url(#cardD)" filter="url(#shadow)"/>
  <circle cx="1470" cy="236" r="62" class="accent"/>
  <text x="1188" y="258" class="cardTitle">4. Test Generation</text>
  <text x="1188" y="292" class="cardBody">Independent automated tests</text>
  <text x="1188" y="318" class="cardBody">Playwright UI regression tests</text>
  <text x="1188" y="344" class="cardBody">Repair loop on failures</text>

  <path class="flow" d="M370 290 H410"/>
  <path class="flow" d="M750 290 H790"/>
  <path class="flow" d="M1120 290 H1160"/>

  <path class="flow" d="M1340 392 V468 H580 V392"/>
  <text x="780" y="450" class="subtitle">Feedback: failing tests and review findings refine later slices</text>

  <rect x="80" y="500" width="1440" height="170" rx="30" fill="#ffffff" opacity="0.76"/>
  <text x="110" y="548" class="label">WHY THIS MATTERS FOR ITINERIS</text>
  <rect x="110" y="572" width="320" height="52" rx="26" fill="#dbeafe"/>
  <text x="142" y="605" class="chip">Document fidelity through validation Gherkins</text>
  <rect x="462" y="572" width="304" height="52" rx="26" fill="#dcfce7"/>
  <text x="495" y="605" class="chip">Controlled implementation from approved slices</text>
  <rect x="798" y="572" width="270" height="52" rx="26" fill="#fef3c7"/>
  <text x="841" y="605" class="chip">Independent test generation</text>
  <rect x="1100" y="572" width="370" height="52" rx="26" fill="#ede9fe"/>
  <text x="1133" y="605" class="chip">Playwright coverage for user-facing regression paths</text>

  <text x="80" y="718" class="footer">Tip: open workflow-map.html for an interactive view with clickable stages and highlighted paths.</text>
</svg>