<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 820" role="img" aria-labelledby="title desc">
  <title id="title">Itineris OpenSpec to OpenCode delivery loop</title>
  <desc id="desc">A high-impact delivery loop visual showing approved artifacts, OpenSpec change definition, OpenCode execution, review, repair, and maintenance feedback.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8f2e7"/>
      <stop offset="100%" stop-color="#eef4ff"/>
    </linearGradient>
    <linearGradient id="brandGlow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e40189"/>
      <stop offset="100%" stop-color="#c70076"/>
    </linearGradient>
    <linearGradient id="teal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f766e"/>
      <stop offset="100%" stop-color="#115e59"/>
    </linearGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="violet" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#0f172a" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#475569"/>
    </marker>
    <style>
      .title { font: 700 34px 'Montserrat', Arial, Helvetica, sans-serif; fill: #e40189; }
      .subtitle { font: 400 18px 'Montserrat', Arial, Helvetica, sans-serif; fill: #3f4b5b; }
      .stepTitle { font: 700 22px 'Montserrat', Arial, Helvetica, sans-serif; fill: #fff; }
      .stepBody { font: 400 15px 'Montserrat', Arial, Helvetica, sans-serif; fill: #eff6ff; }
      .flow { fill: none; stroke: #475569; stroke-width: 4; marker-end: url(#arrow); }
      .note { font: 400 15px 'Montserrat', Arial, Helvetica, sans-serif; fill: #475569; }
    </style>
  </defs>
  <rect width="1600" height="820" rx="36" fill="url(#bg)"/>
  <circle cx="1450" cy="92" r="58" fill="url(#brandGlow)" opacity="0.14"/>
  <text x="70" y="82" class="title">OpenSpec to OpenCode Delivery Loop</text>
  <text x="70" y="114" class="subtitle">The workflow that turns approved Itineris artifacts into bounded implementation slices, reviewed output, and prompt maintenance when patterns repeat.</text>

  <rect x="70" y="180" width="250" height="150" rx="28" fill="url(#amber)" filter="url(#shadow)"/>
  <text x="100" y="238" class="stepTitle">1. Approved Artifacts</text>
  <text x="100" y="272" class="stepBody">Corrected Gherkins, Markdown context,</text>
  <text x="100" y="296" class="stepBody">dependency graph, indexed knowledge</text>

  <rect x="390" y="180" width="250" height="150" rx="28" fill="url(#teal)" filter="url(#shadow)"/>
  <text x="420" y="238" class="stepTitle">2. OpenSpec Change</text>
  <text x="420" y="272" class="stepBody">Proposal, spec, design, and tasks</text>
  <text x="420" y="296" class="stepBody">make the change explicit and reviewable</text>

  <rect x="710" y="180" width="250" height="150" rx="28" fill="url(#blue)" filter="url(#shadow)"/>
  <text x="740" y="238" class="stepTitle">3. OpenCode Execution</text>
  <text x="740" y="272" class="stepBody">Select the right agent stack and run</text>
  <text x="740" y="296" class="stepBody">bounded implementation slices</text>

  <rect x="1030" y="180" width="250" height="150" rx="28" fill="url(#violet)" filter="url(#shadow)"/>
  <text x="1060" y="238" class="stepTitle">4. Review and Validation</text>
  <text x="1060" y="272" class="stepBody">Code review, QA, security, performance,</text>
  <text x="1060" y="296" class="stepBody">test generation, and acceptance checks</text>

  <rect x="1350" y="180" width="180" height="150" rx="28" fill="url(#teal)" filter="url(#shadow)"/>
  <text x="1380" y="238" class="stepTitle">5. Accept</text>
  <text x="1380" y="272" class="stepBody">Slice is ready</text>
  <text x="1380" y="296" class="stepBody">for merge or release</text>

  <path class="flow" d="M320 255 H390"/>
  <path class="flow" d="M640 255 H710"/>
  <path class="flow" d="M960 255 H1030"/>
  <path class="flow" d="M1280 255 H1350"/>

  <rect x="930" y="470" width="280" height="150" rx="28" fill="#ffffff" opacity="0.90" filter="url(#shadow)"/>
  <text x="960" y="528" class="note">Repair loop</text>
  <text x="960" y="552" class="note">If review fails, return to the original owner</text>
  <text x="960" y="576" class="note">with QA context and fix the slice in place.</text>

  <rect x="480" y="470" width="310" height="150" rx="28" fill="#ffffff" opacity="0.90" filter="url(#shadow)"/>
  <text x="510" y="528" class="note">Maintenance loop</text>
  <text x="510" y="552" class="note">If the same workflow mistakes repeat,</text>
  <text x="510" y="576" class="note">run improve-agents.md and tighten prompts.</text>

  <path class="flow" d="M1155 330 V470"/>
  <path class="flow" d="M930 545 H790 V330"/>
  <path class="flow" d="M640 330 V470"/>
  <path class="flow" d="M480 545 H320 V330"/>
  <text x="790" y="442" class="note">Repair returns to execution</text>
  <text x="270" y="442" class="note">Maintenance informs the next slice</text>

  <rect x="70" y="680" width="1460" height="80" rx="24" fill="#ffffff" opacity="0.78"/>
  <text x="100" y="728" class="note">Presentation focus: the process does not jump from documents straight to code. The explicit change layer and the two feedback loops are what make the workflow reliable.</text>
</svg>