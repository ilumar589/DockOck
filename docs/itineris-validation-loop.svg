<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" role="img" aria-labelledby="title desc">
  <title id="title">Itineris validation and test feedback loop</title>
  <desc id="desc">A visual loop showing generated Gherkins, validation files, pattern extraction, implementation, automated tests, and repair feedback.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff8ef"/>
      <stop offset="100%" stop-color="#eef4ff"/>
    </linearGradient>
    <linearGradient id="brandGlow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e40189"/>
      <stop offset="100%" stop-color="#c70076"/>
    </linearGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ea580c"/>
      <stop offset="100%" stop-color="#c2410c"/>
    </linearGradient>
    <linearGradient id="leafA" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f766e"/>
      <stop offset="100%" stop-color="#115e59"/>
    </linearGradient>
    <linearGradient id="leafB" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#1e3a8a"/>
    </linearGradient>
    <linearGradient id="leafC" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#0f172a" flood-opacity="0.16"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#334155"/>
    </marker>
    <style>
      .title { font: 700 34px 'Montserrat', Arial, Helvetica, sans-serif; fill: #e40189; }
      .subtitle { font: 400 18px 'Montserrat', Arial, Helvetica, sans-serif; fill: #3f4b5b; }
      .nodeTitle { font: 700 21px 'Montserrat', Arial, Helvetica, sans-serif; fill: #ffffff; }
      .nodeBody { font: 400 15px 'Montserrat', Arial, Helvetica, sans-serif; fill: #eff6ff; }
      .centerTitle { font: 700 30px 'Montserrat', Arial, Helvetica, sans-serif; fill: #7c2d12; text-anchor: middle; }
      .centerBody { font: 400 18px 'Montserrat', Arial, Helvetica, sans-serif; fill: #7c2d12; text-anchor: middle; }
      .flow { fill: none; stroke: #334155; stroke-width: 4; marker-end: url(#arrow); }
      .caption { font: 400 15px 'Montserrat', Arial, Helvetica, sans-serif; fill: #475569; }
    </style>
  </defs>

  <rect width="1400" height="900" rx="36" fill="url(#bg)"/>
  <circle cx="124" cy="96" r="54" fill="url(#brandGlow)" opacity="0.12"/>
  <text x="80" y="84" class="title">Itineris Validation and Test Feedback Loop</text>
  <text x="80" y="116" class="subtitle">The manually written Gherkins are not just a reference set. They actively shape the corrected output and the test-generation path.</text>

  <circle cx="700" cy="470" r="168" fill="#fff1db" stroke="url(#ring)" stroke-width="26" filter="url(#shadow)"/>
  <text x="700" y="430" class="centerTitle">Corrected Itineris</text>
  <text x="700" y="472" class="centerTitle">Gherkin Set</text>
  <text x="700" y="520" class="centerBody">Approved hand-off artifact</text>
  <text x="700" y="552" class="centerBody">for implementation and tests</text>

  <rect x="120" y="180" width="320" height="140" rx="28" fill="url(#leafA)" filter="url(#shadow)"/>
  <text x="152" y="234" class="nodeTitle">Generated Gherkins</text>
  <text x="152" y="268" class="nodeBody">Draft output from source documents</text>
  <text x="152" y="294" class="nodeBody">using DockOck ingestion and context</text>

  <rect x="960" y="180" width="320" height="140" rx="28" fill="url(#leafA)" filter="url(#shadow)"/>
  <text x="992" y="234" class="nodeTitle">Validation Gherkins</text>
  <text x="992" y="268" class="nodeBody">Manual Itineris scenarios provided</text>
  <text x="992" y="294" class="nodeBody">as source of truth for testing intent</text>

  <rect x="1030" y="620" width="280" height="150" rx="28" fill="url(#leafB)" filter="url(#shadow)"/>
  <text x="1062" y="678" class="nodeTitle">Independent Tests</text>
  <text x="1062" y="712" class="nodeBody">Behavioral tests generated by</text>
  <text x="1062" y="738" class="nodeBody">separate test-focused agents</text>

  <rect x="90" y="620" width="280" height="150" rx="28" fill="url(#leafC)" filter="url(#shadow)"/>
  <text x="122" y="678" class="nodeTitle">Playwright Tests</text>
  <text x="122" y="712" class="nodeBody">UI regression coverage built from</text>
  <text x="122" y="738" class="nodeBody">the same approved scenarios</text>

  <rect x="520" y="130" width="360" height="112" rx="28" fill="#ffffff" opacity="0.86" filter="url(#shadow)"/>
  <text x="550" y="180" class="subtitle">Compare generated vs approved, classify recurring diffs, then apply those patterns to improve the final Gherkins.</text>

  <path class="flow" d="M440 250 C520 250, 530 280, 560 340"/>
  <path class="flow" d="M960 250 C880 250, 870 280, 840 340"/>
  <path class="flow" d="M810 630 C900 650, 960 660, 1030 680"/>
  <path class="flow" d="M590 630 C500 650, 420 665, 370 680"/>
  <path class="flow" d="M1170 620 C1185 555, 1165 500, 1035 470"/>
  <path class="flow" d="M230 620 C210 555, 230 500, 365 470"/>

  <text x="536" y="312" class="caption">Pattern extraction</text>
  <text x="820" y="312" class="caption">Validation source of truth</text>
  <text x="936" y="626" class="caption">Feed approved scenarios</text>
  <text x="392" y="626" class="caption">Feed approved scenarios</text>
  <text x="1036" y="526" class="caption">Failures trigger repair</text>
  <text x="182" y="526" class="caption">Failures trigger repair</text>

  <text x="80" y="850" class="subtitle">Use this together with the interactive HTML view to highlight either the validation path or the testing path during presentations.</text>
</svg>